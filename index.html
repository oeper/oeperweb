<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>oeper.dev — Portal</title>
<link href="https://fonts.cdnfonts.com/css/product-sans" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,300;8..144,400;8..144,500;8..144,600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
<link rel="icon" href="https://oeper.dev/icon.ico" type="image/x-icon">
 
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --md-sys-color-background: #111318;
    --md-sys-color-surface: #1a1c22;
    --md-sys-color-surface-variant: #2f353d;
    --md-sys-color-primary: #a8c7fa;
    --md-sys-color-secondary-container: #33485d;
    --md-sys-color-on-secondary-container: #d2e4ff;
    --md-sys-color-on-surface: #e2e2e6;
    --md-sys-color-on-surface-variant: #c4c7c5;
    --md-sys-color-outline-variant: #8c9199;
    
    --md-transition-duration: 400ms;
    --md-easing-standard: cubic-bezier(0.2, 0, 0, 1);
    --md-easing-emphasized: cubic-bezier(0.3, 0, 0, 1);
  }

  /* Structural document selection guard limits block drag-highlighting layout items */
  html, body, .navbar, .nav-links, .interactive-card, .card-icon-box {
    -webkit-user-select: none;
    -ms-user-select: none;
    user-select: none;
  }

  body { 
    min-height: 100vh;
    background-color: var(--md-sys-color-background);
    font-family: 'Roboto Flex', sans-serif;
    color: var(--md-sys-color-on-surface);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Top Navigation Bar */
  .navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background-color: rgba(17, 19, 24, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(67, 71, 78, 0.4);
    padding: 0 24px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--md-sys-color-on-surface);
    text-decoration: none;
    font-family: 'Product Sans', sans-serif;
    font-size: 22px;
    -webkit-tap-highlight-color: transparent;
  }

  .nav-logo .material-symbols-rounded {
    color: var(--md-sys-color-primary);
    font-size: 28px;
  }

  .nav-links {
    display: flex;
    gap: 8px;
    height: 100%;
    align-items: center;
  }

  .nav-item {
    position: relative;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    text-decoration: none;
    color: var(--md-sys-color-on-surface-variant);
    font-family: 'Product Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    border-radius: 20px;
    transition: color var(--md-transition-duration) var(--md-easing-standard);
    -webkit-tap-highlight-color: transparent; /* Kills flashing selection background on phone tap */
  }

  .nav-item .material-symbols-rounded { font-size: 20px; }

  .nav-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background-color: var(--md-sys-color-surface-variant);
    border-radius: 20px;
    opacity: 0;
    transform: scaleX(0.7);
    transition: opacity var(--md-transition-duration) var(--md-easing-standard),
                transform var(--md-transition-duration) var(--md-easing-emphasized);
    z-index: -1;
  }

  .nav-item:hover { color: var(--md-sys-color-on-surface); }
  .nav-item:hover::before { opacity: 0.5; transform: scaleX(1); }

  .nav-item.active { color: var(--md-sys-color-on-secondary-container); }
  .nav-item.active::before {
    background-color: var(--md-sys-color-secondary-container);
    opacity: 1;
    transform: scaleX(1);
  }

  /* Mobile nav: icon-only circular buttons */
  @media (max-width: 600px) {
    .nav-item {
      padding: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      justify-content: center;
    }

    .nav-item::before {
      border-radius: 50%;
      transform: scale(0.7);
    }

    .nav-item:hover::before {
      transform: scale(1);
    }

    .nav-item.active::before {
      transform: scale(1);
    }

    .nav-item-label {
      display: none;
    }
  }

  /* Content Wrapper */
  .page-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 56px 24px 100px;
  }

  .page-content {
    display: none;
    opacity: 0;
    transform: translateY(24px);
    will-change: transform, opacity;
  }

  .page-content.active {
    display: block;
    animation: materialFadeIn var(--md-transition-duration) var(--md-easing-emphasized) forwards;
  }

  @keyframes materialFadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Explicitly re-enable text selection rules on user narrative copy blocks */
  .hero-section h1, .hero-section p, .interactive-card h3, .interactive-card p, .nav-logo span {
    -webkit-user-select: text;
    -ms-user-select: text;
    user-select: text;
  }

  .animate-text-hero {
    opacity: 0;
    clip-path: inset(0 0 100% 0);
    animation: textReveal 700ms cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
  }
  
  .animate-text-sub {
    opacity: 0;
    animation: fadeInSub 600ms var(--md-easing-standard) forwards;
    animation-delay: 200ms;
  }

  @keyframes textReveal {
    from { opacity: 0; clip-path: inset(0 0 100% 0); transform: translateY(16px); }
    to { opacity: 1; clip-path: inset(0 0 0 0); transform: translateY(0); }
  }

  @keyframes fadeInSub {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-section { margin-bottom: 48px; }
  .hero-section h1 {
    font-family: 'Product Sans', sans-serif;
    font-size: clamp(2.8rem, 7vw, 4rem);
    font-weight: 400;
    letter-spacing: -1px;
    line-height: 1.1;
    margin-bottom: 16px;
  }
  .hero-section p {
    color: var(--md-sys-color-on-surface-variant);
    font-size: 18px;
    line-height: 1.6;
    max-width: 560px;
  }

  .grid-layout {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }

  .interactive-card {
    background-color: var(--md-sys-color-surface);
    border-radius: 28px;
    padding: 28px;
    text-decoration: none;
    color: inherit;
    border: 1px solid transparent;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 180px;
    -webkit-tap-highlight-color: transparent; /* Suppresses blue system feedback box over link geometry */
    transition: background-color 200ms var(--md-easing-standard),
                border-color 200ms var(--md-easing-standard),
                transform 250ms var(--md-easing-emphasized);
  }

  .interactive-card:hover {
    background-color: #21242c;
    border-color: var(--md-sys-color-outline-variant);
    transform: translateY(-4px);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .card-icon-box {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background-color: var(--md-sys-color-surface-variant);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--md-sys-color-primary);
  }

  .card-arrow {
    color: var(--md-sys-color-on-surface-variant);
    font-size: 22px;
    transition: transform 200ms var(--md-easing-standard);
  }

  .interactive-card:hover .card-arrow {
    transform: translate(2px, -2px) scale(1.05);
    color: var(--md-sys-color-primary);
  }

  .interactive-card h3 {
    font-family: 'Product Sans', sans-serif;
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 6px;
  }

  .interactive-card p {
    font-size: 14px;
    line-height: 1.5;
    color: var(--md-sys-color-on-surface-variant);
  }
</style>
</head>
<body>

  <nav class="navbar">
    <a href="#" class="nav-logo" onclick="switchTab(event, 'home')">
      <span class="material-symbols-rounded">token</span>
      <span>oeper.dev</span>
    </a>
    <div class="nav-links" id="navLinksContainer"></div>
  </nav>

  <div class="page-container" id="pageContainer"></div>

<script>
const PAGES = [
  {
    id: 'home',
    title: 'Home',
    icon: 'home',
    heroTitle: 'Welcome to oeper.dev!',
    heroSub: 'This is my website with a bunch of my stuff like my projects, articles and a lot more. Feel free to do whatever you want!',
    items: [
      {
        title: 'Downloads',
        desc: 'My project files.',
        icon: 'download',
        action: "window.location.href='https://oeper.dev/downloads'"
      },
      {
        title: 'Articles',
        desc: 'Check out some stuff I wrote! Who knows, maybe you might find something you like!',
        icon: 'book',
        action: "window.location.href='https://oeper.dev/articles'"
      }
    ]
  },
  {
    id: 'downloads',
    title: 'Downloads',
    icon: 'download',
    url: 'https://oeper.dev/downloads',
    heroTitle: 'Available Packages',
    heroSub: 'Direct setups and resource assets safely archived.',
    items: []
  },
  {
    id: 'articles',
    title: 'Articles',
    icon: 'book',
    url: 'https://oeper.dev/articles',
    heroTitle: 'Project Showcases & Insights',
    heroSub: 'A log of development workflows and experiments.',
    items: []
  }
];

const navContainer = document.getElementById('navLinksContainer');
const pageContainer = document.getElementById('pageContainer');

PAGES.forEach((page, index) => {
  const isFirst = index === 0;

  const navLink = document.createElement('a');
  navLink.className = `nav-item ${isFirst ? 'active' : ''}`;
  navLink.setAttribute('data-tab', page.id);

  if (page.url) {
    navLink.href = page.url;
  } else {
    navLink.href = '#';
    navLink.setAttribute('onclick', `switchTab(event, '${page.id}')`);
  }

  // Wrap label in a span so we can hide it on mobile via CSS
  navLink.innerHTML = `
    <span class="material-symbols-rounded">${page.icon}</span>
    <span class="nav-item-label">${page.title}</span>
  `;
  navContainer.appendChild(navLink);

  if (page.url) return;

  const pageSection = document.createElement('div');
  pageSection.id = page.id;
  pageSection.className = `page-content ${isFirst ? 'active' : ''}`;

  const cardsHtml = page.items.map(item => `
    <a href="#" class="interactive-card" onclick="${item.action}">
      <div class="card-header">
        <div class="card-icon-box"><span class="material-symbols-rounded">${item.icon}</span></div>
        ${item.action !== '#' ? '<span class="material-symbols-rounded card-arrow">north_east</span>' : ''}
      </div>
      <div>
        <h3>${item.title}</h3>
        <p>${item.desc}</p>
      </div>
    </a>
  `).join('');

  pageSection.innerHTML = `
    <div class="hero-section">
      <h1 class="${isFirst ? 'animate-text-hero' : ''}">${page.heroTitle}</h1>
      <p class="${isFirst ? 'animate-text-sub' : ''}">${page.heroSub}</p>
    </div>
    <div class="grid-layout">${cardsHtml}</div>
  `;

  pageContainer.appendChild(pageSection);
});

function switchTab(event, tabId) {
  event.preventDefault();
  
  const currentActiveTab = document.querySelector('.page-content.active');
  if (currentActiveTab.id === tabId) return;
  
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.toggle('active', item.getAttribute('data-tab') === tabId);
  });
  
  currentActiveTab.style.animation = 'none';
  void currentActiveTab.offsetWidth;
  
  currentActiveTab.style.transition = 'opacity 150ms var(--md-easing-standard), transform 150ms var(--md-easing-standard)';
  currentActiveTab.style.opacity = '0';
  currentActiveTab.style.transform = 'translateY(-12px)';
  
  setTimeout(() => {
    currentActiveTab.classList.remove('active');
    currentActiveTab.style.transition = '';
    currentActiveTab.style.transform = '';
    
    const targetTab = document.getElementById(tabId);
    targetTab.classList.add('active');
    
    const h1 = targetTab.querySelector('h1');
    const p = targetTab.querySelector('p');
    if (h1) h1.classList.remove('animate-text-hero');
    if (p) p.classList.remove('animate-text-sub');
  }, 150);
}
</script>
</body>
</html>
