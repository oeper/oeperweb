<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles — oeper.dev</title>
<meta name="description" content="Articles, thoughts and writeups by oeper.dev">
<meta property="og:title" content="Articles — oeper.dev">
<meta property="og:description" content="Articles, thoughts and writeups by oeper.dev">
<meta property="og:url" content="https://oeper.dev/articles">
<meta property="og:type" content="website">
<link rel="icon" href="https://oeper.dev/icon.ico" type="image/x-icon">

<link href="https://fonts.cdnfonts.com/css/product-sans" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,300;8..144,400;8..144,500;8..144,600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Material You Dark Palette */
  :root {
    --md-sys-color-background: #111318;
    --md-sys-color-surface: #1a1c22;
    --md-sys-color-surface-variant: #2f353d;
    --md-sys-color-primary: #a8c7fa;
    --md-sys-color-on-primary: #062e6f;
    --md-sys-color-secondary-container: #33485d;
    --md-sys-color-on-secondary-container: #d2e4ff;
    --md-sys-color-on-surface: #e2e2e6;
    --md-sys-color-on-surface-variant: #c4c7c5;
    --md-sys-color-outline: #43474e;
    --md-sys-color-outline-variant: #8c9199;
  }

  /* Global structural selection guard - scoped safely */
  html, body, .page, .header-container, .toolbar, .search-wrap, .filter-pills, .pill,
  .stats, .article-list, .article-card, .card-meta, .cat-tag, .empty {
    -webkit-user-select: none;
    -ms-user-select: none;
    user-select: none;
  }

  /* Universal mobile touch highlight elimination */
  a, button, input, .pill, .article-card {
    -webkit-tap-highlight-color: transparent;
  }

  body { 
    min-height: 100vh;
    background-color: var(--md-sys-color-background);
    font-family: 'Roboto Flex', sans-serif;
    color: var(--md-sys-color-on-surface);
    overflow-x: hidden;
    position: relative; 
    -webkit-font-smoothing: antialiased;
  }

  .page { position: relative; max-width: 840px; margin: 0 auto; padding: 56px 24px 100px; }

  /* Header Section */
  .header { margin-bottom: 36px; }
  .header-container { margin-bottom: 24px; }
  .header-link { 
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--md-sys-color-primary);
    text-decoration: none;
    font-family: 'Product Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .header-link:hover { opacity: 0.8; }

  /* Explicitly re-allow text selection on readable content strings */
  .header h1, .header p, .stats span, .article-title, .article-excerpt, .card-date, .empty p {
    -webkit-user-select: text;
    -ms-user-select: text;
    user-select: text;
  }

  .header h1 { 
    font-family: 'Product Sans', sans-serif;
    font-size: clamp(2.5rem, 6vw, 3.5rem);
    font-weight: 400; 
    color: var(--md-sys-color-on-surface);
    margin-bottom: 12px; 
    letter-spacing: -0.5px;
  }
  .header p { 
    color: var(--md-sys-color-on-surface-variant);
    font-size: 16px;
    max-width: 500px;
    line-height: 1.5; 
  }

  /* Toolbar & Search Bar */
  .toolbar { 
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 32px;
  }
  .search-wrap { position: relative; width: 100%; }
  .search-wrap .material-symbols-rounded { 
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--md-sys-color-on-surface-variant);
    font-size: 22px;
    pointer-events: none; 
  }
  .search-input { 
    width: 100%;
    background-color: var(--md-sys-color-surface);
    border: 1px solid var(--md-sys-color-outline);
    border-radius: 28px;
    padding: 16px 20px 16px 56px;
    color: var(--md-sys-color-on-surface);
    font-family: 'Roboto Flex', sans-serif;
    font-size: 16px;
    outline: none;
    -webkit-user-select: text;
    -ms-user-select: text;
    user-select: text;
    transition: border-color 0.2s, background-color 0.2s;
  }
  .search-input::placeholder { color: var(--md-sys-color-on-surface-variant); }
  .search-input:focus { 
    border-color: var(--md-sys-color-primary);
    background-color: #1f2329;
  }

  /* Filter Pills */
  .filter-pills { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .pill { 
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--md-sys-color-outline);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Product Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--md-sys-color-on-surface-variant);
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap; 
  }
  .pill .material-symbols-rounded { font-size: 18px; }
  .pill:hover { 
    background-color: rgba(255, 255, 255, 0.04);
    color: var(--md-sys-color-on-surface);
  }
  .pill.active { 
    background-color: var(--md-sys-color-secondary-container);
    border-color: transparent;
    color: var(--md-sys-color-on-secondary-container);
  }

  .stats { 
    font-family: 'Product Sans', sans-serif;
    font-size: 14px;
    color: var(--md-sys-color-on-surface-variant);
    margin-bottom: 24px; 
    padding-left: 4px;
  }
  .stats strong { color: var(--md-sys-color-primary); font-weight: 500; }

  /* Article Cards Layout */
  .article-list { display: flex; flex-direction: column; gap: 16px; }
  
  .article-card {
    background-color: var(--md-sys-color-surface);
    border: 1px solid transparent;
    border-radius: 28px;
    padding: 24px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: background-color 0.2s, border-color 0.2s;
  }
  .article-card:hover { 
    background-color: #21242c;
    border-color: var(--md-sys-color-outline-variant);
  }

  .article-title {
    font-family: 'Product Sans', sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--md-sys-color-on-surface);
    line-height: 1.3;
  }
  .article-excerpt {
    font-size: 15px;
    color: var(--md-sys-color-on-surface-variant);
    line-height: 1.6;
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }
  .card-date {
    font-family: 'Product Sans', sans-serif;
    font-size: 13px;
    color: var(--md-sys-color-outline-variant);
  }

  .cat-tags { display: inline-flex; gap: 6px; }
  .cat-tag { 
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Product Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 8px;
    background-color: var(--md-sys-color-surface-variant);
    color: var(--md-sys-color-on-surface-variant);
  }
  .cat-tag .material-symbols-rounded { font-size: 16px; }

  .empty { text-align: center; padding: 80px 0; color: var(--md-sys-color-on-surface-variant); display: none; }
  .empty .material-symbols-rounded { font-size: 48px; opacity: 0.5; margin-bottom: 16px; }
  .empty p { font-size: 16px; }
</style>
</head>
<body>

<div class="page">
  <header class="header">
    <div class="header-container">
      <a href="https://oeper.dev" class="header-link">
        <span class="material-symbols-rounded">arrow_back</span>
        <span>back to oeper.dev</span>
      </a>
    </div>
    <h1>Articles</h1>
    <p>Thoughts, writeups, and documentation guidelines.</p>
  </header>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="material-symbols-rounded">search</span>
      <input class="search-input" type="text" placeholder="Search articles…" id="searchInput">
    </div>
    <div class="filter-pills" id="filterPills">
      <button class="pill active" data-filter="__all__">
        <span class="material-symbols-rounded">clear_all</span>
        All
      </button>
    </div>
  </div>

  <div class="stats">
    <span>Total: <strong id="visibleCount">0</strong> articles found</span>
  </div>

  <div class="article-list" id="articleList"></div>
  
  <div class="empty" id="emptyState">
    <span class="material-symbols-rounded">search_off</span>
    <p>No articles found matching your filters.</p>
  </div>
</div>

<script>
const CATEGORIES = [
  { id: 'tech',     label: 'Technology', icon: 'terminal' },
  { id: 'design',   label: 'Design',     icon: 'architecture' },
  { id: 'guides',   label: 'Guides',     icon: 'auto_stories' },
];

const ARTICLES = [
  {
    url: 'https://oeper.dev/articles/setup-pock',
    category: 'guides',
    title: 'Customizing Your Mac Touch Bar with Pock',
    excerpt: 'An in-depth guide to installing custom status widgets and setting up responsive traffic light managers directly inside your system Touch Bar layout.',
    date: 'Oct 24, 2025'
  },
  {
    url: 'https://oeper.dev/articles/material-you-tokens',
    category: 'design',
    title: 'Implementing Material You Dark Tokens dynamically',
    excerpt: 'How to clean up web UI palettes using Google Pixel CSS design guidelines, keeping contrast high and interface targets tactile across responsive layouts.',
    date: 'Sep 12, 2025'
  }
];

const CAT_MAP = {};
CATEGORIES.forEach(c => { CAT_MAP[c.id] = c; });

function getCategory(id) {
  return CAT_MAP[id] || { id, label: id, icon: 'folder' };
}

function getCategoryIds(raw) {
  const arr = Array.isArray(raw) ? raw : [raw];
  return arr.slice(0, 5).filter(Boolean);
}

function buildTags(ids) {
  return ids.map(id => {
    const cat = getCategory(id);
    return `
      <span class="cat-tag">
        <span class="material-symbols-rounded">${cat.icon}</span>
        <span>${cat.label}</span>
      </span>
    `;
  }).join('');
}

const usedCatIds = [...new Set(ARTICLES.flatMap(a => getCategoryIds(a.category)))];
const pillsContainer = document.getElementById('filterPills');

usedCatIds.forEach(id => {
  const cat = getCategory(id);
  const b = document.createElement('button');
  b.className = 'pill';
  b.dataset.filter = id;
  b.innerHTML = `
    <span class="material-symbols-rounded">${cat.icon}</span>
    <span>${cat.label}</span>
  `;
  pillsContainer.appendChild(b);
});

const articleList = document.getElementById('articleList');

ARTICLES.forEach(art => {
  const catIds = getCategoryIds(art.category);
  
  const card = document.createElement('a');
  card.className = 'article-card';
  card.href = art.url;
  card.dataset.categories = catIds.join(' ');
  card.dataset.name = art.title.toLowerCase();

  card.innerHTML = `
    <div class="article-title">${art.title}</div>
    <div class="article-excerpt">${art.excerpt}</div>
    <div class="card-meta">
      <span class="card-date">${art.date}</span>
      <div class="cat-tags">${buildTags(catIds)}</div>
    </div>
  `;

  articleList.appendChild(card);
});

let activeFilter = '__all__';
const visibleCount = document.getElementById('visibleCount');
const emptyState   = document.getElementById('emptyState');
const searchInput  = document.getElementById('searchInput');

function setActiveFilter(id) {
  activeFilter = id;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('active', p.dataset.filter === id);
  });
  const url = new URL(window.location);
  if (id === '__all__') { url.searchParams.delete('category'); }
  else { url.searchParams.set('category', id); }
  history.replaceState(null, '', url);
  applyFilters();
}

function applyFilters() {
  const q = searchInput.value.toLowerCase().trim();
  let count = 0;
  articleList.querySelectorAll('.article-card').forEach(card => {
    const cats = card.dataset.categories.split(' ');
    const catMatch = activeFilter === '__all__' || cats.includes(activeFilter);
    const searchMatch = !q || card.dataset.name.includes(q);
    const show = catMatch && searchMatch;
    card.style.display = show ? '' : 'none';
    if (show) count++;
  });
  visibleCount.textContent = count;
  emptyState.style.display = count === 0 ? 'block' : 'none';
}

document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => setActiveFilter(pill.dataset.filter));
});
searchInput.addEventListener('input', applyFilters);

const urlCategory = new URLSearchParams(window.location.search).get('category');
if (urlCategory && document.querySelector(`.pill[data-filter="${urlCategory}"]`)) {
  setActiveFilter(urlCategory);
} else {
  applyFilters();
}
</script>
</body>
</html>
