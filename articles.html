<style>

    --md-sys-color-surface: #1a1c22;
    --md-sys-color-surface-variant: #2f353d;
    --md-sys-color-primary: #a8c7fa;
    --md-sys-color-on-primary: #062e6f;

    --md-sys-color-on-surface: #e2e2e6;
    --md-sys-color-on-surface-variant: #c4c7c5;
    --md-sys-color-outline: #43474e;
    --md-sys-color-outline-variant: #8c9199;
  }

    background-color: var(--md-sys-color-background);

    color: var(--md-sys-color-on-surface);
    overflow-x: hidden;
    position: relative;

  }

  /* Header Section */

  .header-container { margin-bottom: 24px; }
  .header-link { 
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--md-sys-color-primary);
    text-decoration: none;
    font-family: 'Product Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .header-link:hover { opacity: 0.8; }
  .header h1 {

    font-size: clamp(2.5rem, 6vw, 3.5rem);
    font-weight: 400; 
    color: var(--md-sys-color-on-surface);
    margin-bottom: 12px; 
    letter-spacing: -0.5px;
  }
  .header p {

    font-size: 16px;
    max-width: 500px;
    line-height: 1.5; 
  }

    flex-direction: column;

  .search-wrap { position: relative; width: 100%; }

    font-size: 22px;
    pointer-events: none;

  .search-input {

    background-color: var(--md-sys-color-surface);
    border: 1px solid var(--md-sys-color-outline);
    border-radius: 28px;
    padding: 16px 20px 16px 56px;
    color: var(--md-sys-color-on-surface);
    font-family: 'Roboto Flex', sans-serif;
    font-size: 16px;
    outline: none;

  }
  .search-input::placeholder { color: var(--md-sys-color-on-surface-variant); }
  .search-input:focus {

  }

  .filter-pills { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .pill {

    padding: 8px 16px;
    font-family: 'Product Sans', sans-serif;

    font-weight: 500;

const CAT_MAP = {};
CATEGORIES.forEach(c => { CAT_MAP[c.id] = c; });

function getCategory(id) {
  return CAT_MAP[id] || { id, label: id };
}

function getCategoryIds(raw) {
  const arr = Array.isArray(raw) ? raw : [raw];
  return arr.slice(0, 5).filter(Boolean);
}

function buildTags(ids) {
  return ids.map(id => {
    const cat = getCategory(id);
    return `<span class="cat-tag">${cat.label}</span>`;
  }).join('');
}

const usedCatIds = [...new Set(ARTICLES.flatMap(a => getCategoryIds(a.category)))];
const pillsContainer = document.getElementById('filterPills');
usedCatIds.forEach(id => {
  const cat = getCategory(id);
  const b = document.createElement('button');
  b.className = 'pill';
  b.dataset.filter = id;
  b.textContent = cat.label;
  pillsContainer.appendChild(b);
});

const articleList = document.getElementById('articleList');

ARTICLES.forEach((article, i) => {
  const catIds = getCategoryIds(article.category);
  const hasImage = !!article.image;

  const card = document.createElement('div');
  card.className = 'article-card' + (hasImage ? ' has-image' : '');
  card.dataset.categories = catIds.join(' ');
  card.dataset.title = article.title.toLowerCase();
  card.dataset.excerpt = (article.excerpt || '').toLowerCase();
  card.dataset.index = i;

  const imageHtml = hasImage
    ? `<div class="card-image-wrap"><img src="${article.image}" alt="${article.title}" loading="lazy"></div>`
    : '';

  card.innerHTML = `
    ${imageHtml}
    <div class="card-body">
      <div class="card-meta">
        ${buildTags(catIds)}
        <span class="article-date">${article.date}</span>
      </div>
      <div class="article-title">${article.title}</div>
      ${article.excerpt ? `<div class="article-excerpt">${article.excerpt}</div>` : ''}
      <span class="read-more">
        Read article
      </span>
    </div>
  `;

  card.addEventListener('click', () => openReader(i));
  articleList.appendChild(card);
});

/* ============================================================
   UPDATED PARSEMARKDOWN ENGINE
============================================================ */
function parseMarkdown(md) {
  let html = md
    .replace(/\r\n/g, '\n')
    .replace(/```[\w]*\n([\s\S]*?)```/g, (_, code) =>
      `<pre><code>${escHtml(code.trimEnd())}</code></pre>`)
    .replace(/^######\s+(.+)$/gm, '<h6>$1</h6>')
    .replace(/^#####\s+(.+)$/gm,  '<h5>$1</h5>')
    .replace(/^####\s+(.+)$/gm,   '<h4>$1</h4>')
    .replace(/^###\s+(.+)$/gm,    '<h3>$1</h3>')
    .replace(/^##\s+(.+)$/gm,     '<h2>$1</h2>')
    .replace(/^#\s+(.+)$/gm,      '<h1>$1</h1>')
    .replace(/((?:^>\s?.+\n?)+)/gm, match => {
      const inner = match.replace(/^>\s?/gm, '').trim();
      return `<blockquote>${inner}</blockquote>\n`;
    })
    .replace(/^(-{3,}|\*{3,}|_{3,})$/gm, '<hr>')
    .replace(/((?:^[ \t]*[-*+]\s+.+\n?)+)/gm, match => {
      const items = match.trim().split('\n').map(l => `<li>${l.replace(/^[ \t]*[-*+]\s+/, '')}</li>`).join('');
      return `<ul>${items}</ul>\n`;
    })
    .replace(/((?:^[ \t]*\d+\.\s+.+\n?)+)/gm, match => {
      const items = match.trim().split('\n').map(l => `<li>${l.replace(/^[ \t]*\d+\.\s+/, '')}</li>`).join('');
      return `<ol>${items}</ol>\n`;
    })
    .replace(/\*\*\*(.+?)\*\*\txt/, '<strong><em>$1</em></strong>')
    .replace(/\*\textbf{(.+?)}\*\*/g,     '<strong>$1</strong>')
    .replace(/__(.+?)__/g,          '<strong>$1</strong>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:12px;margin:1em 0;">')
    
    /* 1. MATCH BUTTONS FIRST (Strictly matches double brackets [[...]]) */
    .replace(/\[\[([^\]]+)\]\]\(([^)]+)\)/g, '<a href="$2" class="md-button" target="_blank" rel="noopener">$1</a>')
    
    /* 2. MATCH REGULAR LINKS SECOND (Strictly matches single brackets [...]) */
    .replace(/(?<!\抵抗)\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    
    .replace(/\*(.+?)\*/g,          '<em>$1</em>')
    .replace(/(?<!\w)_([^_\s][^_]*)_(?!\w)/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^(?!<[hbuop]|<li|<bl|<pr|<hr|<img|<a)(.+)$/gm, '<p>$1</p>')
    .replace(/\n{3,}/g, '\n\n');
  return html;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const overlay       = document.getElementById('readerOverlay');
const panel         = document.getElementById('readerPanel');
const closeBtn      = document.getElementById('readerCloseBtn');
const readerContent = document.getElementById('readerContent');

function renderReader(article, bodyHtml) {
  const catIds = getCategoryIds(article.category);
  readerContent.innerHTML = `
    ${article.image ? `<img class="reader-image" src="${article.image}" alt="${article.title}">` : ''}
    <div class="reader-cat-row">
      ${buildTags(catIds)}
      <span class="reader-date">${article.date}</span>
    </div>
    <div class="reader-title">${article.title}</div>
    <div class="reader-divider"></div>
    <div class="reader-body">${bodyHtml}</div>
  `;
}

async function openReader(index) {
  const article = ARTICLES[index];
  renderReader(article, `<p style="opacity:0.5;">Loading…</p>`);
  overlay.classList.add('open');
  panel.classList.add('open');
  panel.scrollTop = 0;
  document.body.style.overflow = 'hidden';

  const url = new URL(window.location);
  url.searchParams.set('article', index);
  history.pushState({ article: index }, '', url);

  let bodyHtml;
  if (typeof article.content === 'string' && /^https?:\/\//.test(article.content.trim())) {
    try {
      const res = await fetch(article.content.trim());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      bodyHtml = parseMarkdown(text);
    } catch (err) {
      bodyHtml = `<p style="opacity:0.5;">Could not load content: ${err.message}</p>`;
    }
  } else {
    const looksLikeHtml = /<[a-z][\s\S]*>/i.test(article.content);
    bodyHtml = looksLikeHtml ? article.content : parseMarkdown(article.content);
  }
  renderReader(article, bodyHtml);
}

function closeReader() {
  overlay.classList.remove('open');
  panel.classList.remove('open');
  document.body.style.overflow = '';
  const url = new URL(window.location);
  url.searchParams.delete('article');
  history.pushState({}, '', url);
}

closeBtn.addEventListener('click', closeReader);
overlay.addEventListener('click', closeReader);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReader(); });

let activeFilter = '__all__';
const visibleCount = document.getElementById('visibleCount');
const emptyState   = document.getElementById('emptyState');
const searchInput  = document.getElementById('searchInput');

function setActiveFilter(id) {
  activeFilter = id;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('active', p.dataset.filter === id);
  });
  const url = new URL(window.location);
  if (id === '__all__') { url.searchParams.delete('category'); }
  else { url.searchParams.set('category', id); }
  history.replaceState(null, '', url);
  applyFilters();
}

function applyFilters() {
  const q = searchInput.value.toLowerCase().trim();
  let count = 0;
  articleList.querySelectorAll('.article-card').forEach(card => {
    const cats = card.dataset.categories.split(' ');
    const catMatch = activeFilter === '__all__' || cats.includes(activeFilter);
    const searchMatch = !q || card.dataset.title.includes(q) || card.dataset.excerpt.includes(q);
    const show = catMatch && searchMatch;
    card.style.display = show ? '' : 'none';
    if (show) count++;
  });
  visibleCount.textContent = count;
  emptyState.style.display = count === 0 ? 'block' : 'none';
}

document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => setActiveFilter(pill.dataset.filter));
});
searchInput.addEventListener('input', applyFilters);

const params = new URLSearchParams(window.location.search);
const urlCategory = params.get('category');
const urlArticle  = params.get('article');

if (urlCategory && document.querySelector(`.pill[data-filter="${urlCategory}"]`)) {
  setActiveFilter(urlCategory);
} else {
  applyFilters();
}

if (urlArticle !== null && ARTICLES[+urlArticle]) {
  openReader(+urlArticle);
}
</script>
</body>
</html>
